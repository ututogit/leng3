<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Registro</title>
    <!-- Bootstrap se usa para mejorar el diseño sin complicar el HTML -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos personalizados para ajustes adicionales -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Tarjeta principal del formulario -->
        <div class="form-card shadow-sm rounded-4 bg-white p-4 mt-5">
            <h2 class="form-title text-center mb-4">Registro de Usuario</h2>
            <!-- Mensaje de resultado general: error o éxito -->
            <div id="formResult" class="alert d-none" role="alert"></div>
            <!-- Formulario principal con id para ser referenciado desde JavaScript -->
            <form id="formulario" novalidate>
                <!-- Campo Nombre -->
                <div class="mb-3">
                    <p>Nombre</p>
                    <input type="text" class="form-control" id="nombre" placeholder="Ingrese su nombre">
                    <!-- Contenedor para mostrar mensajes de error específicos -->
                    <div class="invalid-feedback"></div>
                </div>
                <!-- Campo Apellido -->
                <div class="mb-3">
                    <label for="apellido" class="form-label">Apellido</label>
                    <input type="text" class="form-control" id="apellido" placeholder="Ingrese su apellido">
                    <div class="invalid-feedback"></div>
                </div>
                <!-- Campo Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="usuario@ejemplo.com">
                    <div class="invalid-feedback"></div>
                </div>
                <!-- Campo Edad -->
                <div class="mb-3">
                    <label for="edad" class="form-label">Fecha de nacimiento</label>
                    <input type="date" class="form-control" id="edad" min="0">
                    <div class="invalid-feedback"></div>
                </div>
                <!-- Campo Contraseña -->
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="Al menos 6 caracteres">
                    <div class="invalid-feedback"></div>
                </div>
                <!-- Campo Confirmar contraseña -->
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirmar
                        contraseña</label>
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Repita su contraseña">
                    <div class="invalid-feedback"></div>
                </div>
                <!-- Botón de envío -->
                <button type="submit" class="btn btn-primary w-100">Enviar</button>
            </form>
        </div>
    </div>
    <!-- Cargar el script de validación -->
    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>

    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body class="container mt-5">

    <h1 id="titulo">Gestor de Tareas de Proyecto</h1>

    <!-- Formulario-->
    <div class="mb-3">

        <input type="text" id="tarea" class="form-control mb-2" placeholder="Escriba el nombre de la tarea">
        <select id="prioridad" class="form-select mb-2">
            <option value="Alta">Prioridad Alta</option>
            <option value="Media">Prioridad Media</option>
            <option value="Baja">Prioridad Baja</option>
        </select>

        <button id="agregar" class="btn btn-primary">Agregar</button>

    </div>

    <!-- Tabla de tareas-->
    <table id="tablaTareas" class="table table-striped">
        <thead>
            <tr>
                <th>Tarea</th>
                <th>Prioridad</th>
                <th>Accion</th>
            </tr>
        </thead>
        <tbody>

        </tbody>

    </table>

    <!--libreria de JQuery-->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- libreria de DataTables -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>

        $(document).ready(function () {
            let tabla = $('#tablaTareas').DataTable();

            $('#agregar').click(function () {
                let tarea = $('#tarea').val();
                let prioridad = $('#prioridad').val();

                if (tarea === "") {
                    alert("Ingrese una tarea");
                    return;
                }

                let botonEliminar = '<button class="btn btn-danger eliminar">Eliminar</button>';

                let nuevaFila = tabla.row.add([
                    tarea,
                    prioridad,
                    botonEliminar
                ]).draw().node();

                $(nuevaFila).hide().fadeIn(500);

                $('#tarea').val('');

            });

            $('#tablaTareas tbody').on('click', '.eliminar', function() {
                let fila = $(this).closest('tr');
                fila.fadeOut(500, function() {
                    tabla.row(fila).remove().draw();
                });
            });

            $('#titulo').mouseenter(function() {
                $(this).css('color', 'blue');
            });

            $('#titulo').mouseleave(function() {
                $(this).css('color', 'black');
            });

        });

    </script>

</body>

</html>

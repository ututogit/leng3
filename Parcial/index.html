<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de inscripción a curso</title>

    <link rel="stylesheet" href="styles.css">


</head>

<body>

    <h1>Formulario de Registración a Curso</h1>

    <section id="seccion-formulario">

        <form id="formRegistro">

            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Ej: Juan">
            <span id="error-nombre" class="error"></span><br><br>

            <label>Apellido</label>
            <input type="text" id="apellido" placeholder="Ej: Pérez"><br><br>
            <span id="error-apellido" class="error"></span><br><br>

            <label>DNI</label>
            <input type="text" id="dni" placeholder="Ej: 12345678"><br><br>
            <span id="error-dni" class="error"></span><br><br>

            <label>Fecha de Nacimiento</label>
            <input type="date" id="fechaNac"><br><br>
            <span id="error-fecNac" class="error"></span><br><br>

            <button type="button" id="botonValidad" onclick="validarDatos()">Enviar</button>

        </form>

    </section>

    <section id="seccion-preguntas">

        <button type="button" id="botonPreguntas" onclick="hacerPreguntas()">Preguntas</button>

        <div id="respuestas"></div>

    </section>

    <script src="script.js"></script>


</body>

</html>

<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulario</title>

        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Formulario de Reserva de vuelos</h1>

        <p id="resultado" class="resultado"></p>
        <form id="formulario" novalidate>

            <div id="tipo-vuelo" class="grupo">
                <label class="label">Seleccione tipo de vuelo</label>
                <input type="radio" id="ida" name="idaVuelta" value="Ida">Ida
                <input type="radio" id="vuelta" name="idaVuelta" value="Vuelta">Vuelta
                <span id="error-ida-vuelta" class="error-form"></span>

            </div>

            <div id="origen-destino" class="grupo">
                <label class="label">Seleccione el origen</label>
                <select id="origen">
                    <option value="-- Seleccione una opción --">-- Seleccione una opción --</option>
                    <option value="Salta">Salta</option>
                    <option value="Buenos Aires">Buenos Aires</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Mendoza">Mendoza</option>
                </select>
                <label class="label">Seleccione el destino</label>
                <select id="destino">
                    <option value="-- Seleccione una opción --">-- Seleccione una opción --</option>
                    <option value="Salta">Salta</option>
                    <option value="Buenos Aires">Buenos Aires</option>
                    <option value="Córdoba">Córdoba</option>
                    <option value="Mendoza">Mendoza</option>
                </select>
                <span id="error-origen-destino" class="error-form"></span>
            </div>

            <div id="partida-regreso" class="grupo">
                <label class="label">Selecione la fecha de partida</label>
                <input type="date" id="partida">
                <label class="label">Selecione la fecha de regreso</label>
                <input type="date" id="regreso">
                <span id="errorFecha" class="error-form"></span>

            </div>

            <div id="clase" class="grupo">
                <label class="label">Selecione la clase del vuelo</label>
                <input type="radio" id="economy" name="radio-economy" value="Economy">
                <label>Economy</label>
                <input type="radio" id="premium" name="radio-premium" value="Premium Economy">
                <label>Premium Economy</label>
                <input type="radio" id="premium" name="radio-business" value="Bussines">
                <label>Bussines</label>
                <span id="error-clase" class="error-form"></span>

            </div>

            <div id="cantidad-pasajeros" class="grupo">
                <label class="label">Lista de pasajeros</label>
                <select id="pasajeros">
                    <option value="-- Seleccione una opción --">-- Seleccione una opción --</option>
                    <option value="Adultos + 12 años">Adultos + 12 años</option>
                    <option value="Niños 2 a 11 años">Niños 2 a 11 años</option>
                    <option value="Bebes 0 – 23 meses">Bebes 0 – 23 meses</option>
                </select>
            </div>

            <div id="cantidad-pasajeros" class="grupo">
            </div>

            <button type="submit">Reservar</button>

            <div id="codigo-reserva"></div>


        </form>
        <script scr="scripts.js"></script>
    </body>
</html>
